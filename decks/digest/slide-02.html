<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 720pt;
      height: 405pt;
      font-family: 'Pretendard', sans-serif;
      background: #1a1a1a;
      padding: 28pt 48pt;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
  </style>
</head>
<body>
  <div style="display: flex; gap: 28pt; align-items: center;">
    <!-- Left: Feynman photo + quote -->
    <div style="flex-shrink: 0; text-align: center;">
      <img src="./assets/feynman.jpg" style="width: 140pt; height: 180pt; object-fit: cover; border-radius: 10pt; filter: grayscale(20%);">
      <p style="font-size: 8pt; color: #666; margin-top: 6pt;">Richard Feynman</p>
      <p style="font-size: 7pt; color: #555;">Nobel Prize, 1965</p>
    </div>

    <!-- Right: The message -->
    <div style="flex: 1;">
      <p style="font-size: 10pt; color: #666; margin-bottom: 12pt; letter-spacing: 0.1em;">THE FORGETTING PROBLEM</p>

      <h1 style="font-size: 22pt; font-weight: 500; color: #ffffff; line-height: 1.4; margin-bottom: 16pt;">
        "If you can't explain it simply,<br>you don't understand it."
      </h1>

      <!-- Bar chart -->
      <div style="display: flex; align-items: flex-end; gap: 4pt; margin-bottom: 14pt;">
        <div style="width: 60pt; text-align: center;">
          <div style="background: #ba1a1a; height: 14pt; border-radius: 3pt 3pt 0 0;"></div>
          <p style="font-size: 14pt; font-weight: 700; color: #ba1a1a; margin-top: 3pt;">10%</p>
          <p style="font-size: 7pt; color: #666;">Read</p>
        </div>
        <div style="width: 60pt; text-align: center;">
          <div style="background: #ca8a04; height: 28pt; border-radius: 3pt 3pt 0 0;"></div>
          <p style="font-size: 14pt; font-weight: 700; color: #ca8a04; margin-top: 3pt;">20%</p>
          <p style="font-size: 7pt; color: #666;">Watch</p>
        </div>
        <div style="width: 60pt; text-align: center;">
          <div style="background: #ca8a04; height: 56pt; border-radius: 3pt 3pt 0 0;"></div>
          <p style="font-size: 14pt; font-weight: 700; color: #ca8a04; margin-top: 3pt;">50%</p>
          <p style="font-size: 7pt; color: #666;">Quiz</p>
        </div>
        <div style="width: 60pt; text-align: center;">
          <div style="background: #16a34a; height: 84pt; border-radius: 3pt 3pt 0 0;"></div>
          <p style="font-size: 14pt; font-weight: 700; color: #16a34a; margin-top: 3pt;">75%</p>
          <p style="font-size: 7pt; color: #666;">Practice</p>
        </div>
        <div style="width: 60pt; text-align: center;">
          <div style="background: #16a34a; height: 112pt; border-radius: 3pt 3pt 0 0;"></div>
          <p style="font-size: 14pt; font-weight: 700; color: #16a34a; margin-top: 3pt;">90%</p>
          <p style="font-size: 7pt; color: #fff; font-weight: 600;">Explain</p>
        </div>
      </div>

      <p style="font-size: 10pt; color: #888;">
        Access is solved. Understanding is not.<br>
        <strong style="color: #fff;">AI can ask every student: "explain it back."</strong>
      </p>
    </div>
  </div>
</body>
</html>
