<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 720pt;
      height: 405pt;
      font-family: 'Pretendard', sans-serif;
      background: #1a1a1a;
      padding: 28pt 48pt;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
  </style>
</head>
<body>
  <p style="font-size: 10pt; color: #666; margin-bottom: 12pt; letter-spacing: 0.1em;">THE FORGETTING PROBLEM</p>

  <h1 style="font-size: 26pt; font-weight: 500; color: #ffffff; line-height: 1.4; margin-bottom: 20pt;">
    You watched a 1-hour lecture yesterday.<br>
    Today you can't explain <span style="color: #ba1a1a;">a single concept.</span>
  </h1>

  <!-- The retention spectrum -->
  <div style="display: flex; align-items: flex-end; gap: 4pt; margin-bottom: 24pt;">
    <div style="width: 80pt; text-align: center;">
      <div style="background: #ba1a1a; height: 16pt; border-radius: 4pt 4pt 0 0;"></div>
      <p style="font-size: 16pt; font-weight: 700; color: #ba1a1a; margin-top: 4pt;">10%</p>
      <p style="font-size: 8pt; color: #666;">Read</p>
    </div>
    <div style="width: 80pt; text-align: center;">
      <div style="background: #ca8a04; height: 32pt; border-radius: 4pt 4pt 0 0;"></div>
      <p style="font-size: 16pt; font-weight: 700; color: #ca8a04; margin-top: 4pt;">20%</p>
      <p style="font-size: 8pt; color: #666;">Watch</p>
    </div>
    <div style="width: 80pt; text-align: center;">
      <div style="background: #ca8a04; height: 64pt; border-radius: 4pt 4pt 0 0;"></div>
      <p style="font-size: 16pt; font-weight: 700; color: #ca8a04; margin-top: 4pt;">50%</p>
      <p style="font-size: 8pt; color: #666;">Quiz</p>
    </div>
    <div style="width: 80pt; text-align: center;">
      <div style="background: #16a34a; height: 96pt; border-radius: 4pt 4pt 0 0;"></div>
      <p style="font-size: 16pt; font-weight: 700; color: #16a34a; margin-top: 4pt;">75%</p>
      <p style="font-size: 8pt; color: #666;">Practice</p>
    </div>
    <div style="width: 80pt; text-align: center;">
      <div style="background: #16a34a; height: 128pt; border-radius: 4pt 4pt 0 0;"></div>
      <p style="font-size: 16pt; font-weight: 700; color: #16a34a; margin-top: 4pt;">90%</p>
      <p style="font-size: 8pt; color: #fff; font-weight: 600;">Explain</p>
    </div>
  </div>

  <p style="font-size: 12pt; color: #888; font-style: italic;">
    "If you can't explain it simply, you don't understand it." <span style="color: #555;">— Feynman</span>
  </p>
</body>
</html>
