<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 720pt;
      height: 405pt;
      font-family: 'Pretendard', sans-serif;
      background: #1a1a1a;
      padding: 40pt 48pt;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
  </style>
</head>
<body>
  <div style="max-width: 560pt;">
    <p style="font-size: 13pt; color: #888; margin-bottom: 20pt; text-transform: uppercase; letter-spacing: 0.1em;">The Forgetting Problem</p>

    <h1 style="font-size: 36pt; font-weight: 600; color: #ffffff; line-height: 1.3; margin-bottom: 24pt;">
      You read a 30-page paper yesterday.<br>
      How much can you explain right now?
    </h1>

    <div style="display: flex; gap: 32pt; margin-bottom: 28pt;">
      <div>
        <p style="font-size: 56pt; font-weight: 700; color: #ba1a1a;">10%</p>
        <p style="font-size: 11pt; color: #888;">retained from reading</p>
      </div>
      <div style="border-left: 1pt solid #333; padding-left: 32pt;">
        <p style="font-size: 56pt; font-weight: 700; color: #16a34a;">90%</p>
        <p style="font-size: 11pt; color: #888;">retained from explaining</p>
      </div>
    </div>

    <p style="font-size: 14pt; color: #b0b0b0; line-height: 1.6; font-style: italic;">
      "If you can't explain it simply, you don't understand it."
      <span style="color: #666;">— Richard Feynman</span>
    </p>
  </div>
</body>
</html>
