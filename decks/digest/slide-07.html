<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 720pt;
      height: 405pt;
      font-family: 'Pretendard', sans-serif;
      background: #f5f5f0;
      padding: 24pt 32pt;
      display: flex;
      flex-direction: column;
    }
    .card { border-radius: 6pt; overflow: hidden; position: relative; }
    .card img { width: 100%; height: 100%; object-fit: cover; object-position: top; display: block; }
    .card .label { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(transparent, rgba(0,0,0,0.75)); padding: 4pt 6pt; }
    .card .label p { font-size: 7pt; font-weight: 600; color: #fff; }
  </style>
</head>
<body>
  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10pt;">
    <div style="display: flex; align-items: center; gap: 10pt;">
      <p style="display: inline-block; padding: 3pt 8pt; background: #16a34a; color: #fff; border-radius: 4pt; font-size: 7pt; font-weight: 600;">WORKING PRODUCT</p>
      <h2 style="font-size: 18pt; font-weight: 600; color: #1a1a1a;">All 5 Tabs. Live.</h2>
    </div>
    <p style="font-size: 10pt; color: #999;">07</p>
  </div>

  <div style="flex: 1; display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: 150pt 150pt; gap: 6pt;">
    <div class="card">
      <img src="./assets/overview.png">
      <div class="label"><p>🗺️ Overview + Mindmap</p></div>
    </div>
    <div class="card">
      <img src="./assets/quiz.png">
      <div class="label"><p>❓ Quiz — Active Recall</p></div>
    </div>
    <div class="card">
      <img src="./assets/flashcards.png">
      <div class="label"><p>🃏 Flashcards</p></div>
    </div>
    <div class="card">
      <img src="./assets/tutor.png">
      <div class="label"><p>🎓 Feynman Tutor — "Explain it"</p></div>
    </div>
    <div class="card">
      <img src="./assets/overview-chat.png">
      <div class="label"><p>💬 Floating Chat</p></div>
    </div>
    <div style="border-radius: 6pt; background: #1a1a1a; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 12pt;">
      <p style="font-size: 10pt; color: #888; margin-bottom: 6pt;">+ Podcast</p>
      <p style="font-size: 14pt; color: #fff; font-weight: 600;">🎙️ 2-Host AI Audio</p>
      <p style="font-size: 8pt; color: #666; margin-top: 4pt;">Multi-speaker TTS</p>
    </div>
  </div>
</body>
</html>
