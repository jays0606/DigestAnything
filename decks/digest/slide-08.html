<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 720pt;
      height: 405pt;
      font-family: 'Pretendard', sans-serif;
      background: #1a1a1a;
      padding: 40pt 48pt;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }
  </style>
</head>
<body>
  <h1 style="font-size: 40pt; font-weight: 600; color: #ffffff; text-align: center; line-height: 1.3; margin-bottom: 24pt;">
    See it. Test it. <span style="color: #005bbf;">Prove it.</span>
  </h1>

  <p style="font-size: 16pt; color: #888; text-align: center; margin-bottom: 36pt;">
    Reading 10% → Explaining 90%
  </p>

  <div style="display: flex; gap: 8pt; margin-bottom: 36pt;">
    <p style="font-size: 10pt; background: #252525; color: #fff; padding: 6pt 14pt; border-radius: 20pt;">🗺️ Map</p>
    <p style="font-size: 10pt; background: #252525; color: #fff; padding: 6pt 14pt; border-radius: 20pt;">❓ Quiz</p>
    <p style="font-size: 10pt; background: #252525; color: #fff; padding: 6pt 14pt; border-radius: 20pt;">🃏 Cards</p>
    <p style="font-size: 10pt; background: #252525; color: #fff; padding: 6pt 14pt; border-radius: 20pt;">🎙️ Podcast</p>
    <p style="font-size: 10pt; background: #ca8a04; color: #fff; padding: 6pt 14pt; border-radius: 20pt; font-weight: 600;">🎓 "Explain it."</p>
  </div>

  <div style="display: flex; gap: 48pt; margin-bottom: 24pt;">
    <div style="text-align: center;">
      <p style="font-size: 11pt; font-weight: 500; color: #fff;">Jaeho Shin</p>
      <p style="font-size: 9pt; color: #666;">Solo</p>
    </div>
    <div style="text-align: center;">
      <p style="font-size: 11pt; font-weight: 500; color: #fff;">jays0606/DigestAnything</p>
      <p style="font-size: 9pt; color: #666;">GitHub</p>
    </div>
  </div>

  <p style="font-size: 11pt; color: #666; font-style: italic;">"Paste anything. Understand everything."</p>
</body>
</html>
